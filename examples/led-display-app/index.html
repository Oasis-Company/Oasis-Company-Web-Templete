<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Domination Index - LED Display</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0B0B0D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }
    header {
      padding: 40px 20px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0 0 10px 0;
      font-size: 2.5rem;
      color: #FF6A00;
    }
    header p {
      margin: 0;
      color: #888;
      font-size: 1.1rem;
    }
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .controls {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #FF6A00;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .controls button:hover {
      background-color: #FF8A33;
    }
    .controls button:active {
      background-color: #DD5A00;
    }
    footer {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      border-top: 1px solid #222;
    }
    .label {
      color: #888;
      margin-bottom: 8px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Oasis Company</h1>
    <p>World Domination Index</p>
  </header>

  <main>
    <div style="text-align: center;">
      <div class="label">Global Registration Count</div>
      <div id="led-container"></div>
      <div class="controls">
        <button id="increment-btn">Increment</button>
        <button id="reset-btn">Reset</button>
        <button id="random-btn">Random</button>
      </div>
    </div>
  </main>

  <footer id="footer">
    <div class="label">Footer Display</div>
    <div id="footer-led-container"></div>
  </footer>

  <script type="module" src="/examples/led-display-app/main.ts"></script>
</body>
</html>
