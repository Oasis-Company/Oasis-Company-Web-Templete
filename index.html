<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oasis Web Template</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0B0B0D;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Helvetica Neue', Arial, sans-serif;
      }
      header {
        padding: 20px;
        text-align: center;
        color: #fff;
      }
      header h1 {
        margin: 0 0 10px 0;
        color: #FF6A00;
        font-weight: 700;
        font-size: 2.5rem;
        letter-spacing: -0.5px;
      }
      nav {
        margin-top: 20px;
      }
      nav a {
        color: #FF6A00;
        text-decoration: none;
        margin: 0 15px;
        font-size: 1.1rem;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      nav a:hover {
        text-decoration: underline;
      }
      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      footer {
        padding: 40px 20px;
        text-align: center;
        color: #666;
        border-top: 1px solid #222;
      }
      .label {
        color: #888;
        margin-bottom: 8px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Oasis Web Template</h1>
      <nav>
        <a href="/examples/basic-app/">Basic App</a>
        <a href="/examples/dreambase-app/">Dreambase</a>
        <a href="/examples/led-display-app/">LED Display</a>
      </nav>
    </header>
    <main>
      <div id="app"></div>
    </main>
    <footer>
      <div class="label">World Domination Index</div>
      <div id="footer-led-container"></div>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
